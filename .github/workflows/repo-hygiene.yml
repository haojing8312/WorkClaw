name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate consolidated repo hygiene report
        run: pnpm review:repo-hygiene

      - name: Upload repo hygiene report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene-report
          path: .artifacts/repo-hygiene/
          if-no-files-found: error
