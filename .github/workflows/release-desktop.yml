name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            tauri_args: --bundles nsis -- --bin runtime
          - name: linux-x64-deb
            platform: ubuntu-22.04
            tauri_args: --bundles deb -- --bin runtime
          - name: linux-arm64-deb
            platform: ubuntu-22.04-arm
            tauri_args: --bundles deb -- --bin runtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate release tag matches app version
        run: pnpm release:check-version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Load release notes template
        id: release_notes
        shell: bash
        run: |
          {
            echo "body<<EOF"
            cat .github/release-desktop-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKCLAW_USE_COMMITTED_TAURI_ICONS: "1"
        with:
          projectPath: apps/runtime/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: WorkClaw ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
