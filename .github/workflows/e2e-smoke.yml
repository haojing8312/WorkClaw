name: E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir apps/runtime exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm --dir apps/runtime exec playwright test e2e/skill-library-cache.spec.ts e2e/smoke.navigation.spec.ts
