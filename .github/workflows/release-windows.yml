name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate release tag matches app version
        run: pnpm release:check-version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/runtime/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: SkillMint ${{ github.ref_name }}
          releaseBody: Automated Windows release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
