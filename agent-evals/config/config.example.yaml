runtime:
  workspace_root: D:\\code\\WorkClaw
  cargo_manifest_path: apps/runtime/src-tauri/Cargo.toml

models:
  default_profile: minimax_anthropic

providers:
  minimax_anthropic:
    # 支持值:
    # - openai / openrouter / anthropic
    # - minimax / minimax_cn
    provider: minimax
    # 按你的 MiniMax 账号实际可用模型填写
    model: MiniMax-M2.5
    # 只填环境变量名，不要把真实 key 写进 git
    api_key_env: MINIMAX_API_KEY
    # 如需覆盖默认兼容地址，可显式填写：
    # api_format: anthropic
    # base_url: https://api.minimax.io/anthropic

artifacts:
  output_dir: D:\\code\\WorkClaw\\temp\\agent-evals

capabilities:
  pm_weekly_summary:
    workspace_root: E:\\code\\work\\飞书多维表格自动化skill
    entry_kind: workspace_skill
    entry_name: feishu-pm-hub

diagnostics:
  export_journal: true
  export_trace: true
  export_stdout_stderr: true
